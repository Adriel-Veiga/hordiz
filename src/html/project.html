<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/geral.css">
    <link rel="stylesheet" href="../css/project.css">

    <title>hordiz</title>
</head>
<body>
    <main>
        <div class="project-layout">
            <aside class="project-sidebar" id="project-sidebar">
                <h4>Configurações</h4>
                <ul>
                    <li>Membros</li>
                    <li>Arquivos</li>
                    <li>Ajustes</li>
                </ul>
            </aside>

            <div class="project-content">
                <header class="project-header">
                    <button class="sidebar-toggle" id="btn-sidebar">☰</button>
                    <img src="../image/semilogo.png" alt="hordiz logo" id="logo">
                    <h2 id="nome-projeto">Carregando...</h2>
                </header>

                <div class="week-header"></div>

                <div class="board-columns">
                    <div class="board-column" data-status="pendente">
                        <h3>Pendente</h3>
                        <div class="column-cards"></div>
                    </div>
                    <div class="board-column" data-status="fazendo">
                        <h3>Fazendo</h3>
                        <div class="column-cards"></div>
                    </div>
                    <div class="board-column" data-status="concluido">
                        <h3>Concluído</h3>
                        <div class="column-cards"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/project.js"></script>
</body>
</html>
